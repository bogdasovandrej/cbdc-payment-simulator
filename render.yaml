# Blueprint для деплоя на Render.com (бесплатный тариф).
#
# Как задеплоить:
# 1. Зарегистрируйтесь на https://render.com (вход через GitHub).
# 2. New + -> Blueprint -> выберите этот репозиторий -> Apply.
#
# База данных: постоянный PostgreSQL на Neon.tech (бесплатный тариф).
# Значение DATABASE_URL задаётся вручную в панели Render
# (Environment -> DATABASE_URL), поэтому здесь sync: false —
# секреты не хранятся в репозитории.

services:
  - type: web
    name: cbdc-payment-simulator
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MOCK_MIN_DELAY_SECONDS
        value: "1.0"
      - key: MOCK_MAX_DELAY_SECONDS
        value: "3.0"
      - key: MOCK_FAIL_PROBABILITY
        value: "0.2"
